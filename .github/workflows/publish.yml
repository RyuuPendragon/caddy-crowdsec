name: Docker Build and Publish

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/README.md'

jobs:
  build-and-push:
    name: Build Docker image and push to Github Container Registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        with:
          token: ${{ secrets.CADDY_CROWDSEC_TOKEN }}
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CADDY_CROWDSEC_TOKEN }}
      - name: Build the hello-docker Docker image
        run: |
          docker build . --tag ghcr.io/ryuupendragon/caddy-crowdsec:latest
          docker run ghcr.io/ryuupendragon/caddy-crowdsec:latest
          docker push ghcr.io/ryuupendragon/caddy-crowdsec:latest
